services:
  node1:
    build: .
    container_name: blockchain-node1
    env_file:
      - .env
    environment:
      NODE_ID: node1
      PORT: 8080
      NODE_ADDRESS: http://node1:8080
      IS_BOOTSTRAP: "true"
      BOOTSTRAP_NODE: ""
    ports:
      - "8081:8080"

  node2:
    build: .
    container_name: blockchain-node2
    env_file:
      - .env
    environment:
      NODE_ID: node2
      PORT: 8080
      NODE_ADDRESS: http://node2:8080
      IS_BOOTSTRAP: "false"
      BOOTSTRAP_NODE: http://node1:8080
    ports:
      - "8082:8080"
    depends_on:
      - node1

  node3:
    build: .
    container_name: blockchain-node3
    env_file:
      - .env
    environment:
      NODE_ID: node3
      PORT: 8080
      NODE_ADDRESS: http://node3:8080
      IS_BOOTSTRAP: "false"
      BOOTSTRAP_NODE: http://node1:8080
    ports:
      - "8083:8080"
    depends_on:
      - node1